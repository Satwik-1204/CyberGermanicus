<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered SOC Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f111a;
            --card-bg: #1a1d2d;
            --text-main: #e2e8f0;
            --accent-blue: #3b82f6;
            --safe-green: #10b981;
            --ddos-red: #ef4444;
            --anomaly-purple: #8b5cf6;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        h1 { text-align: center; margin-bottom: 5px; color: var(--accent-blue); }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 20px; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .kpi-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #2d3142;
        }

        .kpi-card h3 { margin: 0; font-size: 14px; color: #94a3b8; }
        .kpi-card .value { font-size: 32px; font-weight: bold; margin-top: 10px; }
        .val-total { color: var(--accent-blue); }
        .val-safe { color: var(--safe-green); }
        .val-ddos { color: var(--ddos-red); }
        .val-anomaly { color: var(--anomaly-purple); }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            color: white;
        }
        button:hover { opacity: 0.8; }
        .btn-start { background-color: var(--accent-blue); }
        .btn-ddos { background-color: var(--ddos-red); }
        .btn-anomaly { background-color: var(--anomaly-purple); }

        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .chart-container, .log-container {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #2d3142;
        }

        .log-container { height: 400px; overflow-y: auto; }

        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th, td { padding: 10px; border-bottom: 1px solid #2d3142; }
        th { color: #94a3b8; position: sticky; top: 0; background-color: var(--card-bg); }
        
        .badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-safe { background-color: rgba(16, 185, 129, 0.2); color: var(--safe-green); border: 1px solid var(--safe-green); }
        .badge-ddos { background-color: rgba(239, 68, 68, 0.2); color: var(--ddos-red); border: 1px solid var(--ddos-red); }
        .badge-anomaly { background-color: rgba(139, 92, 246, 0.2); color: var(--anomaly-purple); border: 1px solid var(--anomaly-purple); }
    </style>
</head>
<body>

    <h1>🛡️ AI-Powered SOC Dashboard</h1>
    <div class="subtitle">Live Dual-Engine Threat Detection Simulation</div>

    <div class="dashboard-grid">
        <div class="kpi-card">
            <h3>Total Packets Scanned</h3>
            <div class="value val-total" id="kpi-total">0</div>
        </div>
        <div class="kpi-card">
            <h3>Tier 1: DDoS Blocked</h3>
            <div class="value val-ddos" id="kpi-ddos">0</div>
        </div>
        <div class="kpi-card">
            <h3>Tier 2: Zero-Day Anomalies</h3>
            <div class="value val-anomaly" id="kpi-anomaly">0</div>
        </div>
        <div class="kpi-card">
            <h3>Safe Traffic Allowed</h3>
            <div class="value val-safe" id="kpi-safe">0</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-start" id="toggle-btn" onclick="toggleSimulation()">Start Network Traffic</button>
        <button class="btn-ddos" onclick="triggerDDoS()">🚨 Trigger Volumetric DDoS</button>
        <button class="btn-anomaly" onclick="injectAnomaly()">⚠️ Inject Zero-Day Anomaly</button>
    </div>

    <div class="main-content">
        <div class="chart-container">
            <h3 style="margin-top: 0;">Live Traffic Volume</h3>
            <canvas id="trafficChart"></canvas>
        </div>
        <div class="log-container">
            <h3 style="margin-top: 0;">Live AI Verdict Logs</h3>
            <table id="log-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Type</th>
                        <th>AI Engine Verdict</th>
                    </tr>
                </thead>
                <tbody id="log-body">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let isRunning = false;
        let ddosActive = false;
        let simInterval;
        let counts = { total: 0, safe: 0, ddos: 0, anomaly: 0 };
        const ctx = document.getElementById('trafficChart').getContext('2d');
        const trafficChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(20).fill(''),
                datasets: [
                    { label: 'Benign Packets', borderColor: '#10b981', backgroundColor: 'rgba(16, 185, 129, 0.1)', data: Array(20).fill(0), fill: true, tension: 0.4 },
                    { label: 'DDoS Packets', borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.2)', data: Array(20).fill(0), fill: true, tension: 0.4 },
                    { label: 'Anomalies', borderColor: '#8b5cf6', backgroundColor: 'rgba(139, 92, 246, 0.5)', data: Array(20).fill(0), fill: true, tension: 0.4 }
                ]
            },
            options: {
                responsive: true,
                animation: { duration: 200 },
                scales: {
                    y: { beginAtZero: true, suggestedMax: 50, grid: { color: '#2d3142' } },
                    x: { grid: { display: false } }
                },
                plugins: { legend: { labels: { color: '#e2e8f0' } } }
            }
        });

        function updateKPIs() {
            document.getElementById('kpi-total').innerText = counts.total.toLocaleString();
            document.getElementById('kpi-safe').innerText = counts.safe.toLocaleString();
            document.getElementById('kpi-ddos').innerText = counts.ddos.toLocaleString();
            document.getElementById('kpi-anomaly').innerText = counts.anomaly.toLocaleString();
        }

        function addLog(type, message) {
            const tbody = document.getElementById('log-body');
            const row = document.createElement('tr');
            const time = new Date().toLocaleTimeString('en-US', { hour12: false, fractionalSecondDigits: 2 });
            
            let badgeObj = { class: 'badge-safe', text: 'BENIGN' };
            if (type === 'ddos') badgeObj = { class: 'badge-ddos', text: 'DDOS' };
            if (type === 'anomaly') badgeObj = { class: 'badge-anomaly', text: 'ANOMALY' };

            row.innerHTML = `
                <td>${time}</td>
                <td><span class="badge ${badgeObj.class}">${badgeObj.text}</span></td>
                <td>${message}</td>
            `;
            
            tbody.insertBefore(row, tbody.firstChild);
            if (tbody.children.length > 50) tbody.removeChild(tbody.lastChild);
        }

        function processTrafficStep() {
            let safeVol = Math.floor(Math.random() * 5) + 1;
            let ddosVol = 0;
            let anomalyVol = 0;
            counts.safe += safeVol;
            if (ddosActive) {
                ddosVol = Math.floor(Math.random() * 30) + 20;
                counts.ddos += ddosVol;
                addLog('ddos', 'ALERT: Volumetric Attack detected by XGBoost');
            } else {
                addLog('safe', 'Traffic verified as safe.');
            }
            counts.total += (safeVol + ddosVol + anomalyVol);
            trafficChart.data.datasets[0].data.shift();
            trafficChart.data.datasets[0].data.push(safeVol);
            trafficChart.data.datasets[1].data.shift();
            trafficChart.data.datasets[1].data.push(ddosVol);
            trafficChart.data.datasets[2].data.shift();
            trafficChart.data.datasets[2].data.push(0);
            trafficChart.update();
            updateKPIs();
        }
        function toggleSimulation() {
            const btn = document.getElementById('toggle-btn');
            if (isRunning) {
                clearInterval(simInterval);
                btn.innerText = "Start Network Traffic";
                btn.style.backgroundColor = "var(--accent-blue)";
            } else {
                simInterval = setInterval(processTrafficStep, 800);
                btn.innerText = "Pause Simulation";
                btn.style.backgroundColor = "#64748b";
            }
            isRunning = !isRunning;
        }

        function triggerDDoS() {
            if (!isRunning) toggleSimulation();
            ddosActive = true;
            setTimeout(() => { ddosActive = false; }, 4000);
        }

        function injectAnomaly() {
            if (!isRunning) toggleSimulation();
            counts.anomaly += 1;
            counts.total += 1;
            addLog('anomaly', 'WARNING: Zero-Day pattern caught by Isolation Forest');
            trafficChart.data.datasets[2].data[19] = 10;
            trafficChart.update();
            updateKPIs();
        }
    </script>
</body>
</html>
